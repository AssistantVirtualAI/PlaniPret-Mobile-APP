<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1A4A8A" />
    <title>Planiprêt Mobile</title>
    <meta name="description" content="Planiprêt — application mobile courtier (appels, messages, pipeline, AVA)." />
    <!-- Warm up the asset host early so logos + preloaded chunks resolve fast on cold start. -->
    <link rel="preconnect" href="https://avastatistic.ca" crossorigin />
    <link rel="dns-prefetch" href="https://avastatistic.ca" />
    <link rel="preconnect" href="https://gejxisrqtvxavbrfcoxz.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://gejxisrqtvxavbrfcoxz.supabase.co" />
    <!-- Preload the LCP logo used in the header. -->
    <link rel="preload" as="image" href="https://avastatistic.ca/__l5e/assets-v1/e3dd3a86-14ac-4585-8736-b102e9737302/planipret-logo.png" fetchpriority="high" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #0A1425; height: 100%; overflow: hidden; -webkit-text-size-adjust: 100%; touch-action: manipulation; }
      body { background: #0A1425; height: 100%; min-height: -webkit-fill-available; overflow: hidden; overscroll-behavior: none; }
      #root { background: #0A1425; height: 100%; min-height: -webkit-fill-available; overflow: hidden; }
      input, textarea, select { font-size: 16px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function isIgnorableNativeStartupError(raw) {
          if (!raw || typeof raw !== 'object') return !raw;
          var message = String(raw.message || raw.errorMessage || '').trim();
          var code = String(raw.code || '').trim();
          var keys = [];
          try {
            keys = Object.keys(raw).concat(Object.getOwnPropertyNames(raw));
          } catch (_) {}
          var onlyGeneratedFields = keys.length <= 4 && keys.every(function (key) {
            return ['stack', 'name', 'message', 'errorMessage'].indexOf(key) !== -1;
          });
          return (!message && onlyGeneratedFields) || (code === 'UNIMPLEMENTED' && /not implemented/i.test(message));
        }
        window.__PP_REACT_BOOTED__ = false;
        window.__PP_REACT_BOOT_ATTEMPTED__ = false;
        try {
          var originalAdd = EventTarget && EventTarget.prototype && EventTarget.prototype.addEventListener;
          if (originalAdd && !EventTarget.prototype.__ppSafeAddEventListener) {
            EventTarget.prototype.addEventListener = function (type, listener, options) {
              try {
                return originalAdd.call(this, type, listener, options);
              } catch (err) {
                var isNative = location.protocol === 'capacitor:' || !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
                if (isNative && isIgnorableNativeStartupError(err)) return;
                throw err;
              }
            };
            EventTarget.prototype.__ppSafeAddEventListener = true;
          }
        } catch (_) {}
        window.addEventListener('error', function (event) {
          if (!isIgnorableNativeStartupError(event.error)) return;
          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);
        window.addEventListener('unhandledrejection', function (event) {
          if (!isIgnorableNativeStartupError(event.reason)) return;
          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);
      })();

      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.innerHTML === '' && !window.__PP_REACT_BOOTED__) {
          root.innerHTML = '<div style="color:white;padding:20px;background:#0A1425;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif">Démarrage...</div>';
        }
      }, 1200);

      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.innerHTML.indexOf('Démarrage...') !== -1 && !window.__PP_REACT_BOOTED__) {
          root.innerHTML = '<div style="color:white;padding:24px;background:#0A1425;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;text-align:center">Démarrage interrompu.<br/>Fermez puis relancez l’application.</div>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
