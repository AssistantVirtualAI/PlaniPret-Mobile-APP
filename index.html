<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A4A8A" />
    <!-- iOS WKWebView: status bar transparent + full-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Fonts: Inter (body) + Urbanist (headings/badges) — same as web app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Planiprêt Mobile</title>
    <meta name="description" content="Planiprêt — application mobile courtier (appels, messages, pipeline, AVA)." />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #030712; height: 100%; font-family: 'Inter', system-ui, sans-serif; }
      body { background: #030712; min-height: 100vh; min-height: -webkit-fill-available; -webkit-text-size-adjust: 100%; }
      #root { background: #030712; min-height: 100vh; min-height: -webkit-fill-available; }
      /* Prevent iOS rubber-band scroll outside the app frame */
      body { overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="color:white;padding:20px;background:#030712;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif">Chargement\u2026</div>';
        }
      }, 2000);
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
